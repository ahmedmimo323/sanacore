<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة سند | تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. المتغيرات والأساسيات */
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass-bg: #ffffff;
            --text-main: #333;
            --text-muted: #777;
            --input-bg: #f9f9f9;
            --border-color: #eee;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* ألوان الوضع الداكن */
        [data-theme="dark"] {
            --glass-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #aaa;
            --input-bg: #2d2d2d;
            --border-color: #444;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        /* 2. حاوية التبديل (الوضع الداكن) */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 3px;
            background-color: white;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* 3. هيكل البطاقة الرئيسية */
        .login-card {
            display: flex;
            background: var(--glass-bg);
            width: 900px;
            max-width: 95%;
            height: 580px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .form-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .image-section {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=1470&auto=format&fit=crop') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        @media (max-width: 768px) { .image-section { display: none; } }

        /* 4. عناصر النموذج */
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 20px; }
        h2 { margin: 0 0 10px 0; }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; right: 15px; top: 15px; color: var(--text-muted); }
        .input-group input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            outline: none;
        }

        .toggle-password { left: 15px; right: auto !important; cursor: pointer; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--bg-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-google img { width: 20px; }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--border-color); }
        .divider span { position: relative; background: var(--glass-bg); padding: 0 10px; color: var(--text-muted); font-size: 12px; }

    </style>
</head>
<body>

    <div class="theme-toggle">
        <i class="fas fa-sun"></i>
        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
        <i class="fas fa-moon"></i>
    </div>

    <div class="login-card">
        <div class="form-section">
            <div class="logo"><i class="fas fa-shield-halved"></i> سند</div>
            <h2>تسجيل الدخول</h2>
            <p class="subtitle">أهلاً بك! يرجى إدخال بياناتك للمتابعة.</p>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="البريد الإلكتروني" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passwordField" placeholder="كلمة المرور" required>
                    <i class="fas fa-eye toggle-password" id="eyeIcon"></i>
                </div>

                <button type="submit" class="btn-login">دخول</button>

                <div class="divider"><span>أو عبر</span></div>

                <button type="button" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    متابعة باستخدام جوجل
                </button>
            </form>
        </div>

        <div class="image-section">
            <div style="background: rgba(0,0,0,0.4); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 40px; color: white; text-align: center;">
                <div>
                    <h3>منصة سند الذكية</h3>
                    <p>المستقبل يبدأ من هنا. حلول برمجية متكاملة لبيئة عمل أفضل.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. منطق الوضع الداكن
        const toggle = document.getElementById('darkModeToggle');
        toggle.addEventListener('change', () => {
            if(toggle.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        });

        // 2. إظهار/إخفاء كلمة المرور
        const eyeIcon = document.getElementById('eyeIcon');
        const passwordField = document.getElementById('passwordField');

        eyeIcon.addEventListener('click', () => {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        // 3. منع الإرسال الافتراضي (للتجربة)
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('تم إرسال البيانات! (هذا نموذج تجريبي)');
        });
    </script>
</body>
</html>
